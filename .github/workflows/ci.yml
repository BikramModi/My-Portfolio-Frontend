name: Frontend CI Pipeline

on:
  push:
    branches:
      - develop
      - main

  pull_request:
    branches:
      - develop
      - main

env:
  NEXT_PUBLIC_API_BASE_URL: http://localhost:3001

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Run ESLint
        run: npm run lint

  test:
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Run Jest Tests
        run: npm test -- --runInBand

  e2e:
    runs-on: ubuntu-latest
    needs: test

    env:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:3001

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Build Next.js
        run: npm run build

      - name: Start Next.js
        run: |
          npm run start &
          npx wait-on http://localhost:3000

      - name: Run Playwright Smoke Tests
        run: npx playwright test tests/example.spec.ts

  docker:
    runs-on: ubuntu-latest
    needs: e2e

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Debug Build Arguments
        run: |
          echo "Checking secrets..."

          if [ -n "${{ secrets.PRODUCTION_API_URL }}" ]; then
            echo "✓ PRODUCTION_API_URL found"
          else
            echo "✗ PRODUCTION_API_URL missing"
            exit 1
          fi

          if [ -n "${{ secrets.INTERNAL_API_URL }}" ]; then
            echo "✓ INTERNAL_API_URL found"
          else
            echo "✗ INTERNAL_API_URL missing"
            exit 1
          fi

          echo "NEXT_PUBLIC_API_BASE_URL=${{ secrets.PRODUCTION_API_URL }}"
          echo "INTERNAL_API_BASE_URL=${{ secrets.INTERNAL_API_URL }}"

      - name: Build Docker Image
        run: |
          docker build \
            --no-cache \
            --progress=plain \
            --build-arg NEXT_PUBLIC_API_BASE_URL="${{ secrets.PRODUCTION_API_URL }}" \
            --build-arg INTERNAL_API_BASE_URL="${{ secrets.INTERNAL_API_URL }}" \
            -f Dockerfile.prod \
            -t ${{ secrets.DOCKER_USERNAME }}/portfolio-frontend:latest \
            -t ${{ secrets.DOCKER_USERNAME }}/portfolio-frontend:${{ github.sha }} \
            .

      - name: Push Latest Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/portfolio-frontend:latest

      - name: Push Commit Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/portfolio-frontend:${{ github.sha }}
