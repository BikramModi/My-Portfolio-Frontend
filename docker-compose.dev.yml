services:
  portfolio:
    container_name: portfolio-dev

    build:
      context: .
      dockerfile: Dockerfile.dev

    ports:
      - "3000:3000"

    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next

    env_file:
      - .env.development

    environment:
      NODE_ENV: development

    stdin_open: true
    tty: true

    networks:
      - portfolio-network

networks:
  portfolio-network:
    external: true